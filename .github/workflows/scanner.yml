name: Crypto Scanner

on:
  schedule:
    # Run daily at 00:00 UTC (after daily candle closes)
    - cron: "0 0 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push dashboard results

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/live_scan.py

      - name: Commit dashboard results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: scanner results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
